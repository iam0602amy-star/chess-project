<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
    <!-- VR Controls -->
    <script src="https://gftruj.github.io/webzamples/aframe/controls/oculus-thumbstick-controls.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Sky -->
      <a-sky color="#ECECEC"></a-sky>

      <!-- Environment -->
      <a-entity environment="preset: forest"></a-entity>
  

      <!-- Lighting -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="3 5 2" intensity="1"></a-light>
      <a-light type="point" position="0 3 -8" intensity="0.6"></a-light>

     <a-assets>
        <a-asset-item id="carrot" src="https://cdn.jsdelivr.net/gh/iam0602amy-star/chess-project@main/carrot final.glb"></a-asset-item>
       </a-assets>
      <!-- MODEL -->
      <a-entity 
        gltf-model="#carrot"
        position="0 2 -8" 
        scale="1.5 1.5 1.5"
        rotation="0 30 0">
      </a-entity>

  

      <!-- VR CAMERA RIG -->
      <a-entity id="rig" position="0 1.6 5">
        <a-camera>
          <a-entity oculus-touch-controls="hand: left"></a-entity>
          <a-entity oculus-touch-controls="hand: right" oculus-thumbstick-controls></a-entity>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
